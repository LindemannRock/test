name: craft-starter
type: craftcms
docroot: web
php_version: "8.3"
webserver_type: nginx-fpm
xdebug_enabled: false
additional_hostnames: []
additional_fqdns: []
database:
    type: mysql
    version: "8.0"
webimage_extra_packages: [build-essential, libvips-dev, libasound2, libatk1.0-0, libcairo2, libgdk-pixbuf-xlib-2.0-0, libgtk-3-0, libnspr4, libpango-1.0-0, libpangocairo-1.0-0, libx11-xcb1, libxcomposite1, libxcursor1, libxdamage1, libxfixes3, libxi6, libxrandr2, libxrender1, libxss1, libxtst6, fonts-liberation, libappindicator3-1, libnss3, xdg-utils]
use_dns_when_possible: true
performance_mode: mutagen
timezone: Asia/Dubai
composer_version: "2"
nodejs_version: "22"
corepack_enable: false
web_environment:
    - CPPFLAGS=-DPNG_ARM_NEON_OPT=0
upload_dirs:
    - web/assets
    - storage
hooks:
    post-start:
        - exec: |
              if [ ! -f /var/www/html/.env ]; then
                echo ""
                echo "=============================================="
                echo "  No .env found."
                echo "  Run 'make create' on the host to set up"
                echo "  the project interactively."
                echo "=============================================="
                echo ""
              fi
